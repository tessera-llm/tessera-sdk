name: Publish Python to PyPI (sigstore-attested)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC token for sigstore attestation / Trusted Publishing

jobs:
  publish:
    name: Build + upload (sigstore-attested)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Check PYPI_TOKEN secret
        id: check-secret
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$PYPI_TOKEN" ]; then
            echo "::warning::PYPI_TOKEN secret not set on this repo. Set via: gh secret set PYPI_TOKEN --repo tessera-llm/<repo>. Falls back to Trusted Publishing if configured at https://pypi.org/manage/account/publishing/."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI (with sigstore attestations)
        if: steps.check-secret.outputs.skip == "false"
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          attestations: true

