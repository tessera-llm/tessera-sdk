name: Publish Node (@tessera-llm/tessera-sdk) to npm

# Fires on a tag matching `node-v*` (e.g. node-v0.1.0). Builds the dist/
# bundles in node/ and publishes to npm via npm publish using the
# NPM_TOKEN repo secret. Workflow tagged 2026-05-23.

on:
  push:
    tags:
      - 'node-v*'
  workflow_dispatch:

jobs:
  publish:
    name: Build + publish @tessera-llm/tessera-sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
